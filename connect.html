<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Submit your sports highlights or register a new pickup game with The Benchwarmer.">
    <link rel="stylesheet" href="style.css">
    <title>Join | The Benchwarmer</title>
</head>
<body>
    <header>
        <h1>JOIN THE GAME</h1>
        <p>Luke Combs | May 4, 2026</p>
    </header>

    <nav>
        <a href="index.html">Home</a> <a href="news.html">JV News</a> <a href="courts.html">Courts</a> 
        <a href="map.html">Map</a> <a href="events.html">Calendar</a> <a href="clips.html">Clips</a> 
        <a href="gallery.html">Photos</a> <a href="about.html">About</a> <a href="connect.html">Join</a>
    </nav>

    <main class="container">
        <h2>Submit Your Play</h2>
        <p>Got a wild gym class clip or a new pickup game starting? Fill out the form below to alert the community network.</p>
        
        <form action="https://formspree.io/f/placeholder" method="POST">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" name="fullName" placeholder="John Doe" required>
            
            <label for="studentEmail">Student Email</label>
            <input type="email" id="studentEmail" name="studentEmail" placeholder="student@school.edu" required>
            
            <label for="submissionType">What are you submitting?</label>
            <select id="submissionType" name="submissionType">
                <option value="clip">Gym Class Highlight Clip</option>
                <option value="pickup">New Pickup Game Location</option>
                <option value="general">General Question</option>
            </select>
            
            <label for="message">Details / Link to Video</label>
            <textarea id="message" name="message" rows="5" placeholder="Tell us about the play or the park..." required></textarea>
            
            <button type="submit">Submit to the Commish</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 The Benchwarmer | <a href="mailto:lcombs@stu.edu">Email the Commish</a></p>
    </footer>
</body>
</html>
